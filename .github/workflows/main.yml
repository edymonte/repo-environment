name: CD Fake
on: 
    workflow_dispatch: 
jobs:
    deploy-fake-homologacao:
        runs-on: ubuntu-latest
        environment:
          name: hmologacao
          url: "http://homologacao.edymonte.com.br"
        steps:
            - name: Fake de deploy em ambiente
              run: echo "Deploy no ambiente de ${{ vars.AMBIENTE_DEPLOY }}"
    teste-fake:
        runs-on: ubuntu-latest
        environment:
          name: hmologacao
          url: "http://homologacao.edymonte.com.br"
        needs: [deploy-fake-homologacao]
        steps:
            - name: Fake de deploy em ambiente
              run: echo "Deploy no ambiente de ${{ vars.AMBIENTE_DEPLOY }}"
    QA:
        runs-on: ubuntu-latest
        environment:
          name: hmologacao
          url: "http://homologacao.edymonte.com.br"
        needs: [teste-fake]
        steps:
            - name: Fake de deploy em ambiente
              run: echo "Deploy no ambiente de ${{ vars.AMBIENTE_DEPLOY }}"
    deploy-fake-producao:
        runs-on: ubuntu-latest
        needs: [QA]
        environment:
          name: producao
          url: "http://producao.edymonte.com.br"
        steps:
            - name: Fake de deploy em ambiente
              run: echo "Deploy no ambiente de ${{ vars.AMBIENTE_DEPLOY }}"
